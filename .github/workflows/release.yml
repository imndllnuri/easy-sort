name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Determine mod version (tag name without the leading 'v')
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Determine target Minecraft version from gradle.properties
        # Was previously hardcoded per publish step below and silently went
        # stale across three MC version bumps (v1.0.1 through v1.2.0 all
        # published to Modrinth/CurseForge as "1.21.10" regardless of the
        # jar's actual target) - reading it from the single source of truth
        # instead so it can't drift again.
        id: mc_version
        run: |
          value=$(grep -m1 '^minecraft_version=' gradle.properties | cut -d= -f2)
          echo "value=$value" >> "$GITHUB_OUTPUT"

      - name: Determine release channel from the tag
        id: channel
        run: |
          if [[ "$GITHUB_REF_NAME" == *-beta* ]]; then
            echo "value=beta" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF_NAME" == *-alpha* ]]; then
            echo "value=alpha" >> "$GITHUB_OUTPUT"
          else
            echo "value=release" >> "$GITHUB_OUTPUT"
          fi

      - name: Stage release artifacts with loader-unique names
        # fabric/ and neoforge/ both produce identically-named jars
        # (easy-sort-<version>.jar) - a GitHub Release requires unique asset
        # filenames, so upload straight from both build/libs/ dirs would
        # silently collide/overwrite instead of attaching both.
        run: |
          mkdir -p release-artifacts
          V="${{ steps.version.outputs.value }}"
          cp "fabric/build/libs/easy-sort-$V.jar" "release-artifacts/easy-sort-$V-fabric.jar"
          cp "fabric/build/libs/easy-sort-$V-sources.jar" "release-artifacts/easy-sort-$V-fabric-sources.jar"
          cp "neoforge/build/libs/easy-sort-$V.jar" "release-artifacts/easy-sort-$V-neoforge.jar"
          cp "neoforge/build/libs/easy-sort-$V-sources.jar" "release-artifacts/easy-sort-$V-neoforge-sources.jar"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*.jar
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}

      - name: Publish Fabric build to Modrinth & CurseForge
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: "tNAlPFb9"
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge-id: "1596721"
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          files: fabric/build/libs/easy-sort-${{ steps.version.outputs.value }}.jar
          name: Easy Sort ${{ github.ref_name }} (Fabric)
          version: ${{ github.ref_name }}
          version-type: ${{ steps.channel.outputs.value }}
          changelog-file: CHANGELOG.md
          loaders: fabric
          game-versions: ${{ steps.mc_version.outputs.value }}
          # Fabric API dependency isn't declared here yet - set it manually on
          # each platform's project settings page for now, or add it here
          # later once the exact `id@version(type)` syntax is confirmed.

      - name: Publish NeoForge build to Modrinth & CurseForge
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: "tNAlPFb9"
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge-id: "1596721"
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          files: neoforge/build/libs/easy-sort-${{ steps.version.outputs.value }}.jar
          name: Easy Sort ${{ github.ref_name }} (NeoForge)
          version: ${{ github.ref_name }}
          version-type: ${{ steps.channel.outputs.value }}
          changelog-file: CHANGELOG.md
          loaders: neoforge
          game-versions: ${{ steps.mc_version.outputs.value }}

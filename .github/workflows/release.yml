name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}

      - name: Publish to Modrinth & CurseForge
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: "tNAlPFb9"
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge-id: "1596721"
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          files: build/libs/!(*-@(dev|sources)).jar
          name: Easy Sort ${{ github.ref_name }}
          version: ${{ github.ref_name }}
          version-type: alpha
          changelog-file: CHANGELOG.md
          loaders: fabric
          game-versions: 1.21.10
          # Fabric API dependency isn't declared here yet - set it manually on
          # each platform's project settings page for now, or add it here
          # later once the exact `id@version(type)` syntax is confirmed.
